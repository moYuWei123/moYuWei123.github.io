<div class="search-overlay" id="searchOverlay">
  <div class="search-bg" id="searchBg"></div>
  <div class="search-container">
    <div class="search-input-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索…" autocomplete="off">
      <button class="search-close" id="searchClose">&times;</button>
    </div>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>
<button class="back-to-top" id="backToTop" aria-label="Back to top">↑</button>
<script>
(function(){
  var path = location.pathname;
  var links = document.querySelectorAll('.nav a');
  links.forEach(function(a){
    var href = a.getAttribute('href');
    if (href === '/' && path === '/') { a.classList.add('active'); return; }
    if (href !== '/' && path.startsWith(href)) { a.classList.add('active'); }
  });
})();
(function(){
  var bar = document.getElementById('readingProgress');
  if (!bar) return;
  window.addEventListener('scroll', function(){
    var h = document.documentElement;
    var st = h.scrollTop || document.body.scrollTop;
    var sh = h.scrollHeight - h.clientHeight;
    bar.style.width = sh > 0 ? (st / sh * 100) + '%' : '0%';
  }, {passive: true});
})();
(function(){
  var overlay = document.getElementById('searchOverlay');
  var input = document.getElementById('searchInput');
  var results = document.getElementById('searchResults');
  var searchBtn = document.getElementById('navSearch');
  var closeBtn = document.getElementById('searchClose');
  var bg = document.getElementById('searchBg');
  if (!overlay || !input || !results || !searchBtn) return;

  var searchData = null;

  searchBtn.addEventListener('click', function(){
    overlay.classList.add('active');
    setTimeout(function(){ input.focus(); }, 100);
    if (!searchData) loadSearch();
  });

  function close() { overlay.classList.remove('active'); results.innerHTML = ''; input.value = ''; }
  closeBtn.addEventListener('click', close);
  bg.addEventListener('click', close);

  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape' && overlay.classList.contains('active')) close();
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      overlay.classList.add('active');
      setTimeout(function(){ input.focus(); }, 100);
      if (!searchData) loadSearch();
    }
  });

  function loadSearch() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/search.xml', true);
    xhr.onload = function(){
      if (xhr.status === 200) {
        var parser = new DOMParser();
        var xml = parser.parseFromString(xhr.responseText, 'text/xml');
        var entries = xml.querySelectorAll('entry');
        searchData = [];
        entries.forEach(function(e){
          var url = e.querySelector('url') && e.querySelector('url').textContent || '';
          // Skip wallpaper posts in search results
          if (/\/bing-/.test(url) || /\/bing-wallpaper/.test(url)) return;
          searchData.push({
            title: e.querySelector('title') && e.querySelector('title').textContent || '',
            url: url,
            content: (e.querySelector('content') && e.querySelector('content').textContent || '').replace(/<[^>]+>/g, ''),
            date: e.querySelector('date') && e.querySelector('date').textContent || ''
          });
        });
      }
    };
    xhr.send();
  }

  var timer;
  input.addEventListener('input', function(){
    clearTimeout(timer);
    var q = input.value.trim();
    if (!q) { results.innerHTML = ''; return; }
    if (!searchData) { results.innerHTML = '<div class="search-empty">索引加载中…</div>'; return; }
    timer = setTimeout(function(){ doSearch(q); }, 150);
  });

  function doSearch(q) {
    var lower = q.toLowerCase();
    var matched = [];
    searchData.forEach(function(item){
      var score = 0;
      var title = item.title || '';
      var content = item.content || '';
      if (title.toLowerCase().indexOf(lower) !== -1) score += 3;
      if (content.toLowerCase().indexOf(lower) !== -1) score += 1;
      if (score > 0) matched.push({item: item, score: score});
    });
    matched.sort(function(a,b){ return b.score - a.score; });
    matched = matched.slice(0, 15);

    if (!matched.length) {
      results.innerHTML = '<div class="search-empty">无结果</div>';
      return;
    }
    var html = '';
    matched.forEach(function(m){
      var item = m.item;
      html += '<a class="search-result-item" href="' + item.url + '">';
      html += '<div class="search-result-title">' + highlight(item.title, q) + '</div>';
      html += '<div class="search-result-meta">' + (item.date ? item.date.substring(0,10) : '') + '</div>';
      html += '</a>';
    });
    results.innerHTML = html;
  }

  function highlight(text, q) {
    var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return text.replace(re, '<em>$1</em>');
  }
})();
(function(){
  var filterBtns = document.querySelectorAll('.filter-btn');
  var newsItems = document.querySelectorAll('.news-item');
  if (!filterBtns.length || !newsItems.length) return;
  filterBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      filterBtns.forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      var filter = btn.getAttribute('data-filter');
      newsItems.forEach(function(item){
        if (filter === 'all') {
          item.style.display = '';
        } else {
          var cats = item.getAttribute('data-categories') || '';
          item.style.display = cats.split(',').indexOf(filter) !== -1 ? '' : 'none';
        }
      });
    });
  });
})();
(function(){
  var imgs = document.querySelectorAll('.post-content img');
  imgs.forEach(function(img){
    if (img.complete) { img.classList.add('loaded'); }
    else { img.addEventListener('load', function(){ img.classList.add('loaded'); }); }
  });
})();
(function(){
  var btn = document.getElementById('backToTop');
  if (!btn) return;
  window.addEventListener('scroll', function(){
    btn.classList.toggle('visible', (document.documentElement.scrollTop || document.body.scrollTop) > 400);
  }, {passive: true});
  btn.addEventListener('click', function(){
    window.scrollTo({top: 0, behavior: 'smooth'});
  });
})();
</script>
